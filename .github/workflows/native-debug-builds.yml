name: Native Debug Builds

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.6"
  PUB_CACHE: ${{ github.workspace }}/.pub-cache

jobs:
  build-android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore Pub cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Package APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-debug.apk dist/neiroha-android-debug.apk
          (cd dist && sha256sum neiroha-android-debug.apk > SHA256SUMS-android-debug.txt)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neiroha-android-debug-apk
          path: dist/**
          if-no-files-found: error

  build-linux:
    name: Linux desktop debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ccache \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libmpv-dev \
            libepoxy-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore Pub cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Restore C/C++ cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-linux-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-linux-ccache-

      - name: Enable C/C++ compiler cache
        run: |
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          ccache --zero-stats

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --debug

      - name: Show C/C++ cache stats
        if: always()
        run: ccache --show-stats || true

      - name: Package Linux bundle
        run: |
          mkdir -p dist
          tar -C build/linux/x64/debug/bundle -czf dist/neiroha-linux-x64-debug.tar.gz .
          (cd dist && sha256sum neiroha-linux-x64-debug.tar.gz > SHA256SUMS-linux-debug.txt)

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: neiroha-linux-x64-debug
          path: dist/**
          if-no-files-found: error

  build-windows:
    name: Windows desktop debug
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore Pub cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PUB_CACHE }}
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --debug

      - name: Package Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = "dist/neiroha-windows-x64-debug.zip"
          Compress-Archive -Path "build/windows/x64/runner/Debug/*" -DestinationPath $zip -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLowerInvariant()
          "$hash  neiroha-windows-x64-debug.zip" | Out-File -FilePath "dist/SHA256SUMS-windows-debug.txt" -Encoding ascii

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: neiroha-windows-x64-debug
          path: dist/**
          if-no-files-found: error
