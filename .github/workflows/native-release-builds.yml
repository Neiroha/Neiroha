name: Native Release Builds

on:
  push:
    tags:
      - "v*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish assets to, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FLUTTER_VERSION: "3.41.6"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build-android:
    name: Android release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Package APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/neiroha-${RELEASE_TAG}-android-release.apk"
          (cd dist && sha256sum "neiroha-${RELEASE_TAG}-android-release.apk" > SHA256SUMS-android-release.txt)

      - name: Attest APK provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/neiroha-*-android-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neiroha-android-release-apk
          path: dist/**
          if-no-files-found: error

  build-linux:
    name: Linux desktop release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libmpv-dev \
            libepoxy-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf "dist/neiroha-${RELEASE_TAG}-linux-x64-release.tar.gz" .
          (cd dist && sha256sum "neiroha-${RELEASE_TAG}-linux-x64-release.tar.gz" > SHA256SUMS-linux-release.txt)

      - name: Attest Linux provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/neiroha-*-linux-x64-release.tar.gz

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: neiroha-linux-x64-release
          path: dist/**
          if-no-files-found: error

  build-windows:
    name: Windows desktop release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipName = "neiroha-${env:RELEASE_TAG}-windows-x64-release.zip"
          $zip = "dist/$zipName"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $zip -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLowerInvariant()
          "$hash  $zipName" | Out-File -FilePath "dist/SHA256SUMS-windows-release.txt" -Encoding ascii

      - name: Attest Windows provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/neiroha-*-windows-x64-release.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: neiroha-windows-x64-release
          path: dist/**
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-linux
      - build-windows
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate aggregate checksums
        run: |
          cd dist
          sha256sum neiroha-* > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Neiroha ${{ env.RELEASE_TAG }}
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: dist/**
